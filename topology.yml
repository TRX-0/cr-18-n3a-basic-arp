name: cr-18-n3a-basic-arp
hosts:
  - name: vm1
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: false
  - name: vma
    flavor: c1_r4_d20
    base_box:
      image: kali-2026.1-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    hidden: false
routers: []
networks:
  - name: lan
    cidr: 192.168.25.0/24
    accessible_by_user: true
    hidden: false
net_mappings:
  - host: vm1
    network: lan
    ip: 192.168.25.10
  - host: vma
    network: lan
    ip: 192.168.25.20
router_mappings: []
groups: []
